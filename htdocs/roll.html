<!DOCTYPE html>
<html>
	<head>
		<title>Transition and Animation Exercises</title>
		<meta charset="UTF-8">
    	<meta name="description" content="Sample Code to implement transform and transition">
    <meta name="author" content="A.L. Mendoza & M.Tarcelo">
    <meta name="revised" content="12/04/2022">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<style>
      * {box-sizing: border-box}
			div{
				transition: all 0.5s;
			}
			#roll{
				width: 400px;
				height: 400px;
				margin: 30px auto;
			}
			#roll img{
				width: 100%;
        		height: 100%;
        		opacity: 0.75;
			}
      		#roll img:hover{
				opacity: 1;
			}
			#roll div{
				width: 200px;
				height: 200px;
				position: absolute;
			}
			#roll div:first-of-type{
				background-color: red;
				bottom: 723px;
			}
			#roll div:nth-of-type(2){
				background-color: yellow;
				bottom: 723px;
				right: 756px;
				}
			#roll div:nth-of-type(3){
				background-color: blue;
				bottom: 523px;
			}
			#roll div:last-of-type{
 				background-color: green;
				right: 756px;
				bottom: 523px;
			}



			#roll:hover div:first-of-type{
				background-color: red;
				bottom: 723px;
				transform-origin: top left;
				transform: skew(-45deg, 0deg)
			}
			#roll:hover div:nth-of-type(2){
				background-color: yellow;
				bottom: 723px;
				right: 756px;
				transform-origin: top left;
				transform: skew(45deg, 0deg) 
				}
			#roll:hover div:nth-of-type(3){
				background-color: blue;
				bottom: 523px;
				transform-origin: bottom right;
				transform: skew(45deg, 0deg)
			}
			#roll:hover div:last-of-type{
 				background-color: green;
				right: 756px;
				bottom: 523px;
				transform-origin: bottom right;
				transform: skew(-45deg, 0deg)
			}
			p {
				text-align: center;
			}
		</style>
	</head>
	<body>
		<div id="roll">
			<p><a href="../index.html"> 
        <img src="../images/funny.jpg"/>
      </a>
      </p> 
			<div></div>
			<div></div>
			<div></div>
			<div></div>
		</div>
    <p>Click on the Image for Home<br/>
    Source: https://www.ba-bamail.com/cute-overload/75-of-the-cutest-kittens-in-the-world/
    </p>
    
	</body>
</html>
